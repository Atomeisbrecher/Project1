<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в приложение</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px 20px; background: #f4f4f9; }
        form { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 320px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007AFF; color: white; border: none; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>
    <form action="/login" method="POST">
        <h2>Войти</h2>
        <input type="text" name="username" placeholder="Логин (admin)" required>
        <input type="password" name="password" placeholder="Пароль (admin)" required>
        
        <input type="hidden" name="client_id" value="{{ client_id }}">
        <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}">
        <input type="hidden" name="code_challenge" value="{{ code_challenge }}">
        <input type="hidden" name="state" value="{{ state }}">
        
        <button type="submit">Продолжить</button>
    </form>
</body>
</html>
